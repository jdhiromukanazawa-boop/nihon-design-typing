<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日本デザイン タイピング大会</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&family=Noto+Sans+JP:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ロビー -->
<div id="screen-lobby" class="screen active">
  <header class="lobby-header">
    <div class="logo-badge">株式会社日本デザイン</div>
    <h1>🎹 タイピング大会</h1>
    <button id="soundToggle" class="sound-btn" title="サウンドON">🔊</button>
  </header>

  <div class="lobby-body">
    <section class="select-section">
      <h2 class="section-label">▶ キャラクターを選ぶ</h2>
      <div class="player-grid" id="playerGrid"></div>
      <button class="btn btn-primary btn-start" id="startBtn" disabled>プレイ開始 ▶</button>
      <p class="key-hint" id="startHint" style="display:none">スペースキーでもスタートできます</p>
    </section>

    <section class="ranking-section">
      <h2 class="section-label">▶ 歴代ランキング</h2>
      <div class="lb-header-row">
        <span class="lbh-rank">順位</span>
        <span class="lbh-name">名前</span>
        <span class="lbh-score">スコア</span>
        <span class="lbh-wpm">WPM</span>
        <span class="lbh-acc">正確率</span>
        <span class="lbh-time">時間</span>
      </div>
      <div id="lobbyLeaderboard" class="leaderboard"></div>
    </section>
  </div>
</div>

<!-- カウントダウン -->
<div id="screen-countdown" class="screen">
  <div class="cd-wrap">
    <p class="cd-label">準備して！</p>
    <div class="cd-num" id="cdNum">3</div>
  </div>
</div>

<!-- ゲーム -->
<div id="screen-game" class="screen">
  <div class="game-root">
    <div class="game-topbar">
      <div class="round-info">TEXT <span id="roundNum">1</span><span class="round-sep">/</span><span id="maxRound">10</span></div>
      <div class="category-pill" id="catPill"></div>
      <div class="timer-box" id="timerBox">60</div>
    </div>

    <div class="game-main-solo">
      <main class="typing-area">
        <div class="display-card">
          <div class="display-text" id="displayText"></div>
          <div class="display-romaji" id="displayRomaji"></div>
        </div>

        <div class="input-card">
          <div class="char-preview" id="charPreview"></div>
          <input
            id="typingInput"
            type="text"
            class="typing-input"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            placeholder="スペースキーは不要です"
            disabled
          />
          <div class="input-meta">
            <span id="accuracyLabel">正確率 —</span>
            <span id="wpmLabel">— WPM</span>
          </div>
        </div>

        <div class="progress-dots" id="progressDots"></div>
        <div class="text-result-flash" id="textResultFlash"></div>
      </main>
    </div>
  </div>
</div>

<!-- 結果 -->
<div id="screen-result" class="screen">
  <div class="result-solo-wrap">
    <div id="confettiCanvas" class="confetti-layer"></div>
    <h2 class="result-solo-title">🎉 プレイ完了！</h2>

    <div class="my-result-card">
      <img class="my-avatar" id="resultAvatar" src="" alt="">
      <div class="my-nickname" id="resultNickname"></div>
      <div class="my-score-big"><span id="resultScore">0</span><small>pt</small></div>
      <div class="my-stats">
        <div class="my-stat-item">
          <div class="stat-val" id="resultWpm">—</div>
          <div class="stat-label">WPM</div>
        </div>
        <div class="my-stat-sep"></div>
        <div class="my-stat-item">
          <div class="stat-val" id="resultAccuracy">—</div>
          <div class="stat-label">正確率</div>
        </div>
      </div>
    </div>

    <div class="result-ranking-section">
      <h3 class="section-label">▶ 歴代ランキング</h3>
      <div class="lb-header-row">
        <span class="lbh-rank">順位</span>
        <span class="lbh-name">名前</span>
        <span class="lbh-score">スコア</span>
        <span class="lbh-wpm">WPM</span>
        <span class="lbh-acc">正確率</span>
        <span class="lbh-time">時間</span>
      </div>
      <div id="resultLeaderboard" class="leaderboard"></div>
    </div>

    <div class="memory-section">
      <h3 class="section-label">▶ 思い出の社員</h3>
      <div class="memory-players" id="memoryPlayers"></div>
      <div class="memory-msg" id="memoryMsg"></div>
    </div>

    <button class="btn btn-primary btn-replay" id="replayBtn">もう一回プレイ ▶</button>
  </div>
</div>

<!-- モーダル -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <p id="modalText"></p>
    <button class="btn btn-primary" onclick="closeModal()">OK</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body>
</html>
